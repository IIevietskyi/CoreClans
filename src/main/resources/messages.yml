  line-1: "&7/clan create <name>, /clan invite <player>, /clan join <name>, /clan leave"
  line-2: "&7/clan chat <msg>, /clan chat toggle, /clan bank <deposit|withdraw> <amount>"
  line-3: "&7/clan war challenge <clan> <capture|beacon|crystal> [stake], /clan war accept <id>, /clan war deny <id>"
